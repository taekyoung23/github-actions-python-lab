name: 01 Basic Workflow

on:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 메시지 출력
        run: echo "GitHub Actions Python Basic Workflow Running"

      - name: 현재 디렉터리 확인
        run: pwd

      - name: 파일 목록 확인
        run: ls -al
